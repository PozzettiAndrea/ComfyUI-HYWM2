[cuda]
packages = ["gsplat_maskgaussian", "flash-attn", "fused-ssim"]

[dependencies]
av = "*"
numpy = ">=1.24.0"
pillow = ">=10.0.0"
scipy = ">=1.11.0"
matplotlib = ">=3.9.0"
psutil = ">=5.9.0"
trimesh = "*"
plyfile = ">=1.0.0"
opencv = ">=4.9.0"
huggingface_hub = "*"
tqdm = "*"

[target.linux-64.dependencies]
c-compiler = "*"

[target.win-64.pypi-dependencies]
triton-windows = ">=3.5.0"

[pypi-dependencies]
safetensors = ">=0.4.0,<1.0.0"
omegaconf = ">=2.3.0,<3.0.0"
einops = ">=0.7.0,<1.0.0"
onnxruntime = "*"
comfy-aimdo = "*"
transformers = "*"
# --- world_gs_trainer.py deps (HY-World-2.0/hyworld2/worldgen) ---
viser = "*"
tyro = "*"
tensorboard = "*"
torchmetrics = "*"
imageio = "*"
imagesize = "*"
scikit-learn = "*"

[pypi-dependencies.nerfview]
git = "https://github.com/nerfstudio-project/nerfview.git"
rev = "4538024fe0d15fd1a0e4d760f3695fc44ca72787"
# Note: fused-ssim moved to [cuda].packages — prebuilt wheels in cuda-wheels
# (packages/fused_ssim.yml). Avoids the build-dispatch torch-link panic that
# pixi hits when it tries to bootstrap pytorch from conda-forge for a CUDA-
# extension sdist build.