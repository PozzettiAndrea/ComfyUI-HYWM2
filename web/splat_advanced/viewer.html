<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>HYWM2 — Splat Viewer</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #111; color: #e0e0e0; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; font-size: 12px; overflow: hidden; }
  #root { display: flex; height: 100vh; width: 100vw; }
  #left { flex: 1 1 70%; min-width: 280px; position: relative; background: #0a0a0a; }
  #splat-host { position: absolute; inset: 0; }
  #splat-host canvas { display: block; }
  #status { position: absolute; left: 8px; top: 8px; padding: 4px 8px; background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a; border-radius: 3px; pointer-events: none; max-width: calc(100% - 16px); font-size: 11px; z-index: 5; }
  #status.error { color: #ff8a8a; border-color: #5a2222; background: rgba(60,20,20,0.85); }
  #axis-buttons { position: absolute; right: 8px; top: 8px; display: flex; gap: 2px; z-index: 5; }
  .axis-btn { padding: 2px 6px; background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a; color: #bbb; font-size: 10px; cursor: pointer; border-radius: 2px; font-family: ui-monospace, "SF Mono", monospace; line-height: 1.2; min-width: 28px; }
  .axis-btn:hover { background: rgba(50,50,50,0.95); color: #fff; border-color: #555; }
  .axis-btn.reset { color: #6cc; }
  #mode-toolbar { position: absolute; left: 8px; bottom: 8px; display: flex; gap: 4px; z-index: 5; align-items: center; }
  #spectate-btn { padding: 4px 10px; background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a; color: #bbb; font-size: 11px; cursor: pointer; border-radius: 3px; font-family: ui-monospace, "SF Mono", monospace; line-height: 1.2; }
  #spectate-btn:hover { background: rgba(50,50,50,0.95); color: #fff; border-color: #555; }
  #spectate-btn.active { background: rgba(60,90,40,0.9); color: #fff; border-color: #6c6; }
  #spectate-help { padding: 4px 8px; background: rgba(20,20,20,0.85); border: 1px solid #2a2a2a; border-radius: 3px; color: #888; font-size: 10px; font-family: ui-monospace, "SF Mono", monospace; display: none; }
  #spectate-help.show { display: block; color: #ccc; }
  #right { flex: 0 0 320px; max-width: 380px; min-width: 240px; display: flex; flex-direction: column; background: #161616; border-left: 1px solid #262626; }
  #panes { flex: 1 1 auto; overflow-y: auto; padding: 10px 12px 16px 12px; }
  .pane { display: block; }
  h3 { margin: 6px 0 6px 0; font-size: 11px; letter-spacing: 0.04em; color: #9aa; text-transform: uppercase; font-weight: 600; }
  .controls { display: grid; grid-template-columns: auto 1fr; gap: 5px 8px; align-items: center; }
  .controls label { color: #888; font-size: 10px; }
  .controls input[type="range"] { width: 100%; }
  .small { color: #777; font-size: 10px; line-height: 1.4; }
</style>
</head>
<body>
<div id="root">
  <div id="left">
    <div id="splat-host"></div>
    <div id="status">Awaiting .splat…</div>
    <div id="axis-buttons">
      <button class="axis-btn" data-view="+xy" title="Camera on +Z, looking at XY (front)">+XY</button>
      <button class="axis-btn" data-view="-xy" title="Camera on -Z, looking at XY (back)">-XY</button>
      <button class="axis-btn" data-view="+xz" title="Camera on +Y, looking at XZ (top)">+XZ</button>
      <button class="axis-btn" data-view="-xz" title="Camera on -Y, looking at XZ (bottom)">-XZ</button>
      <button class="axis-btn" data-view="+yz" title="Camera on +X, looking at YZ (right)">+YZ</button>
      <button class="axis-btn" data-view="-yz" title="Camera on -X, looking at YZ (left)">-YZ</button>
      <button class="axis-btn reset" data-view="reset" title="Reframe to bounding box (R)">⟲</button>
    </div>
    <div id="mode-toolbar">
      <button id="spectate-btn" title="Toggle WASD fly-through (Esc to exit)">Spectate</button>
      <div id="spectate-help">WASD = move · Mouse = look · Q/E = down/up · Shift = sprint · Esc = exit</div>
    </div>
  </div>
  <div id="right">
    <div id="panes">
      <div class="pane active" id="pane-render">
        <h3>Renderer</h3>
        <p class="small">Real 3DGS rasterization via
          <a href="https://github.com/mkkellogg/GaussianSplats3D"
             target="_blank" rel="noreferrer"
             style="color:#6cc">@mkkellogg/GaussianSplats3D</a>:
          alpha-sorted ellipsoid splatting with SH₀ shading.</p>
        <h3>Camera</h3>
        <div class="controls">
          <label for="fov">Vertical FOV</label>
          <input type="range" id="fov" min="15" max="100" step="1" value="50" />
          <label for="opacity-mul">Opacity ×</label>
          <input type="range" id="opacity-mul" min="0" max="3" step="0.05" value="1" />
          <label for="size-mul">Splat size ×</label>
          <input type="range" id="size-mul" min="0.05" max="5" step="0.05" value="1" />
          <label for="background">Background</label>
          <input type="color" id="background" value="#0a0a0a" />
          <label for="up-axis">Up axis</label>
          <select id="up-axis">
            <option value="-y">-Y (OpenCV / WorldMirror, default)</option>
            <option value="+y">+Y (three.js)</option>
            <option value="+z">+Z</option>
          </select>
        </div>
        <p class="small">Drag = orbit · Right-drag = pan · Wheel = zoom.
          Press R to reframe.</p>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.164.1",
    "@mkkellogg/gaussian-splats-3d": "https://esm.sh/@mkkellogg/gaussian-splats-3d@0.4.5?deps=three@0.164.1"
  }
}
</script>
<script type="module">
import * as THREE from "three";
import * as GaussianSplats3D from "@mkkellogg/gaussian-splats-3d";

const status = document.getElementById("status");
const splatHost = document.getElementById("splat-host");
const setStatus = (msg, isErr=false) => {
  status.textContent = msg;
  status.classList.toggle("error", !!isErr);
};
window.parent?.postMessage({ type: "HYWM2_VIEWER_READY" }, "*");

// ===========================================================
// mkkellogg Viewer
// ===========================================================
let viewer = null;
let bbox = null;
let currentSceneAttached = false;
let currentSceneUrl = null;

function getCameraUp() {
  switch (document.getElementById("up-axis").value) {
    case "+y": return [0, 1, 0];
    case "+z": return [0, 0, 1];
    case "-y": default: return [0, -1, 0];
  }
}

async function recreateViewer() {
  if (viewer) {
    try { viewer.stop(); } catch {}
    try { await viewer.dispose(); } catch {}
    viewer = null;
    currentSceneAttached = false;
  }
  splatHost.replaceChildren();

  const fov = parseFloat(document.getElementById("fov").value || "50");
  viewer = new GaussianSplats3D.Viewer({
    cameraUp: getCameraUp(),
    initialCameraPosition: [0, 0, -2],
    initialCameraLookAt: [0, 0, 0],
    sphericalHarmonicsDegree: 0,
    rootElement: splatHost,
    selfDrivenMode: true,
    useBuiltInControls: true,
    sharedMemoryForWorkers: false,
    gpuAcceleratedSort: false,
  });
  viewer.start();
  if (viewer.camera && "fov" in viewer.camera) {
    viewer.camera.fov = fov;
    viewer.camera.updateProjectionMatrix?.();
  }
  applyBackgroundColor();
}
await recreateViewer();

function applyBackgroundColor() {
  const hex = document.getElementById("background").value;
  if (!viewer) return;
  try {
    viewer.renderer?.setClearColor(new THREE.Color(hex), 1.0);
  } catch {}
}

document.getElementById("fov").addEventListener("input", e => {
  if (viewer?.camera && "fov" in viewer.camera) {
    viewer.camera.fov = parseFloat(e.target.value);
    viewer.camera.updateProjectionMatrix?.();
  }
});
document.getElementById("background").addEventListener("input", applyBackgroundColor);
document.getElementById("up-axis").addEventListener("change", async () => {
  const lastUrl = currentSceneUrl;
  await recreateViewer();
  if (lastUrl) await attachSplatScene(lastUrl);
});

// .splat record size (fixed 32 B/Gaussian Antimatter15 format).
const REC = 32;

// ===========================================================
// Camera / axis snap
// ===========================================================
function frameBoundingBox() {
  if (!bbox || !viewer) return;
  const sphere = bbox.getBoundingSphere(new THREE.Sphere());
  const cam = viewer.camera, ctrl = viewer.controls;
  if (!cam) return;
  const dist = Math.max(sphere.radius * 2.2, 0.05);
  cam.position.copy(sphere.center.clone().add(new THREE.Vector3(0, 0, -1).multiplyScalar(dist)));
  cam.lookAt(sphere.center);
  if (ctrl) { ctrl.target.copy(sphere.center); ctrl.update?.(); }
  cam.updateProjectionMatrix?.();
}
const _AXIS_DIRS = {
  "+xy": new THREE.Vector3(0, 0, 1), "-xy": new THREE.Vector3(0, 0, -1),
  "+xz": new THREE.Vector3(0, 1, 0), "-xz": new THREE.Vector3(0, -1, 0),
  "+yz": new THREE.Vector3(1, 0, 0), "-yz": new THREE.Vector3(-1, 0, 0),
};
function snapToAxis(name) {
  if (name === "reset") return frameBoundingBox();
  const dir = _AXIS_DIRS[name];
  if (!dir || !bbox || !viewer) return;
  const sphere = bbox.getBoundingSphere(new THREE.Sphere());
  const cam = viewer.camera, ctrl = viewer.controls;
  if (!cam) return;
  const radius = Math.max(sphere.radius * 2.2, 0.05);
  cam.position.copy(sphere.center).addScaledVector(dir, radius);
  cam.lookAt(sphere.center);
  if (ctrl) { ctrl.target.copy(sphere.center); ctrl.update?.(); }
}
document.querySelectorAll("#axis-buttons .axis-btn").forEach(btn => {
  btn.addEventListener("click", () => snapToAxis(btn.dataset.view));
});
window.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "r" && !spectate) frameBoundingBox();
});

// ===========================================================
// Spectate mode (FPS/WASD fly-through)
// ===========================================================
let spectate = false;
let yaw = 0, pitch = 0;
const keys = new Set();
const spectateBtn = document.getElementById("spectate-btn");
const spectateHelp = document.getElementById("spectate-help");

function _spectateUpVec() {
  return new THREE.Vector3(...getCameraUp());
}

/** Build a right-handed (forward, right, up) basis from current yaw/pitch. */
function _spectateBasis() {
  const up = _spectateUpVec().normalize();
  // pick any horizontal axis not parallel to up
  let seed = new THREE.Vector3(0, 0, 1);
  if (Math.abs(seed.dot(up)) > 0.9) seed.set(1, 0, 0);
  const right0 = new THREE.Vector3().crossVectors(seed, up).normalize();
  const fwd0 = new THREE.Vector3().crossVectors(up, right0).normalize();
  // yaw around up
  const qy = new THREE.Quaternion().setFromAxisAngle(up, yaw);
  const fwd = fwd0.clone().applyQuaternion(qy);
  const right = new THREE.Vector3().crossVectors(fwd, up).normalize();
  // pitch around current right
  const qp = new THREE.Quaternion().setFromAxisAngle(right, pitch);
  fwd.applyQuaternion(qp);
  const upOut = new THREE.Vector3().crossVectors(right, fwd).normalize();
  return { fwd, right, up: upOut };
}

/** Seed yaw/pitch from current camera so toggling doesn't snap. */
function _spectateInit() {
  const cam = viewer?.camera;
  if (!cam) return;
  const up = _spectateUpVec().normalize();
  const view = new THREE.Vector3(0, 0, -1).applyQuaternion(cam.quaternion).normalize();
  // pitch = angle to horizontal plane
  pitch = Math.asin(Math.max(-1, Math.min(1, view.dot(up))));
  // horizontal projection
  const horiz = view.clone().addScaledVector(up, -view.dot(up)).normalize();
  // pick the same seed as basis
  let seed = new THREE.Vector3(0, 0, 1);
  if (Math.abs(seed.dot(up)) > 0.9) seed.set(1, 0, 0);
  const right0 = new THREE.Vector3().crossVectors(seed, up).normalize();
  const fwd0 = new THREE.Vector3().crossVectors(up, right0).normalize();
  // yaw = atan2 of horiz against (fwd0, right0)
  yaw = Math.atan2(horiz.dot(right0), horiz.dot(fwd0));
}

let _origControlsUpdate = null;

function setSpectate(on) {
  spectate = !!on;
  spectateBtn.classList.toggle("active", spectate);
  spectateBtn.textContent = spectate ? "Exit Spectate" : "Spectate";
  spectateHelp.classList.toggle("show", spectate);

  // mkkellogg's Viewer calls controls.update() every frame inside its
  // render loop. Stock OrbitControls.update() re-derives the camera
  // position from `target + spherical_offset` and forces lookAt(target)
  // unconditionally — `enabled = false` only gates input handling, not
  // the per-frame camera write. So while spectating we stub it out.
  if (viewer?.controls) {
    if (spectate) {
      if (!_origControlsUpdate) _origControlsUpdate = viewer.controls.update;
      viewer.controls.update = function () { /* no-op while spectating */ };
      viewer.controls.enabled = false;
    } else {
      if (_origControlsUpdate) {
        viewer.controls.update = _origControlsUpdate;
        _origControlsUpdate = null;
      }
      viewer.controls.enabled = true;
      try {
        const cam = viewer.camera;
        if (cam && viewer.controls.target) {
          // Resync orbit target to a point in front of the camera so
          // the next orbit drag pivots around the spot the user
          // stopped at, not the original load-time origin.
          const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(cam.quaternion);
          viewer.controls.target.copy(cam.position).addScaledVector(dir, 1);
          viewer.controls.update();
        }
      } catch {}
    }
  }

  if (spectate) {
    _spectateInit();
    splatHost.requestPointerLock?.();
  } else {
    if (document.pointerLockElement) document.exitPointerLock?.();
    keys.clear();
  }
}

spectateBtn.addEventListener("click", () => setSpectate(!spectate));

document.addEventListener("pointerlockchange", () => {
  if (spectate && document.pointerLockElement !== splatHost) {
    setSpectate(false);
  }
});

document.addEventListener("mousemove", (e) => {
  if (!spectate) return;
  const sens = 0.0025;
  yaw -= e.movementX * sens;
  pitch = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, pitch - e.movementY * sens));
});

window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  keys.add(k);
  if (spectate && (k === "w" || k === "a" || k === "s" || k === "d" ||
                   k === "q" || k === "e" || k === " ")) {
    e.preventDefault();
  }
  if (k === "escape" && spectate) setSpectate(false);
});
window.addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));
window.addEventListener("blur", () => keys.clear());

// Per-frame integration loop. Speed scales with the bbox extent so
// arrow-key magnitude is reasonable across vastly different scenes.
let _lastT = performance.now();
function spectateTick() {
  requestAnimationFrame(spectateTick);
  const now = performance.now();
  const dt = Math.min(0.1, (now - _lastT) / 1000);
  _lastT = now;
  if (!spectate || !viewer?.camera) return;

  const cam = viewer.camera;
  const { fwd, right, up } = _spectateBasis();
  cam.up.copy(up);

  const sceneSize = bbox ? bbox.getSize(new THREE.Vector3()).length() : 4;
  const baseSpeed = Math.max(0.1, sceneSize * 0.3);
  const speed = (keys.has("shift") ? 4 : 1) * baseSpeed * dt;

  if (keys.has("w")) cam.position.addScaledVector(fwd, speed);
  if (keys.has("s")) cam.position.addScaledVector(fwd, -speed);
  if (keys.has("a")) cam.position.addScaledVector(right, -speed);
  if (keys.has("d")) cam.position.addScaledVector(right, speed);
  if (keys.has("e") || keys.has(" ")) cam.position.addScaledVector(up, speed);
  if (keys.has("q") || keys.has("control")) cam.position.addScaledVector(up, -speed);

  cam.lookAt(cam.position.clone().add(fwd));
  cam.updateMatrixWorld?.();
}
spectateTick();

// ===========================================================
// Scene attach
// ===========================================================
async function attachSplatScene(url) {
  if (!viewer) return;
  if (currentSceneAttached) {
    try { await viewer.removeSplatScene(0); } catch {}
    currentSceneAttached = false;
  }
  await viewer.addSplatScene(url, {
    format: GaussianSplats3D.SceneFormat.Splat,
    showLoadingUI: false,
    progressiveLoad: false,
    splatAlphaRemovalThreshold: 5,
  });
  currentSceneAttached = true;
}

// ===========================================================
// Main load path
// ===========================================================
// Original .splat bytes for the currently loaded scene — kept so the
// opacity slider can rebuild the buffer with scaled alphas without
// re-fetching from the server.
let _origBytes = null;
let _opacityRebuildHandle = null;
let _lastBlobUrl = null;

async function rebuildScene() {
  if (!_origBytes) return;
  const opacityFactor = parseFloat(document.getElementById("opacity-mul").value || "1");
  const sizeFactor = parseFloat(document.getElementById("size-mul").value || "1");

  const out = new Uint8Array(_origBytes.length);
  out.set(_origBytes);
  const dv = new DataView(out.buffer);
  const needScale = Math.abs(sizeFactor - 1) > 1e-3;
  const needAlpha = Math.abs(opacityFactor - 1) > 1e-3;

  for (let i = 0; i < out.length; i += REC) {
    if (needScale) {
      // Scales live at offset 12..23: 3 × float32 little-endian, linear units.
      dv.setFloat32(i + 12, dv.getFloat32(i + 12, true) * sizeFactor, true);
      dv.setFloat32(i + 16, dv.getFloat32(i + 16, true) * sizeFactor, true);
      dv.setFloat32(i + 20, dv.getFloat32(i + 20, true) * sizeFactor, true);
    }
    if (needAlpha) {
      // Alpha lives at offset 27 (uint8).
      const v = Math.round(_origBytes[i + 27] * opacityFactor);
      out[i + 27] = v < 0 ? 0 : (v > 255 ? 255 : v);
    }
  }

  const blob = new Blob([out], { type: "application/octet-stream" });
  const url = URL.createObjectURL(blob);
  try {
    await attachSplatScene(url);
  } finally {
    if (_lastBlobUrl) URL.revokeObjectURL(_lastBlobUrl);
    _lastBlobUrl = url;
  }
}

function _scheduleRebuild() {
  if (_opacityRebuildHandle) clearTimeout(_opacityRebuildHandle);
  _opacityRebuildHandle = setTimeout(() => {
    _opacityRebuildHandle = null;
    rebuildScene().catch(err => {
      console.error("[Splat Viewer] rebuild failed:", err);
    });
  }, 120);
}

document.getElementById("opacity-mul").addEventListener("input", _scheduleRebuild);
document.getElementById("size-mul").addEventListener("input", _scheduleRebuild);

async function loadSplat(url, fileMeta) {
  currentSceneUrl = url;
  setStatus(`Fetching ${fileMeta.filename || ".splat"}…`);

  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Fetch failed: ${resp.status} ${resp.statusText}`);
  const buf = await resp.arrayBuffer();
  // Stash original alpha for the slider.
  _origBytes = new Uint8Array(buf);
  if (_lastBlobUrl) { URL.revokeObjectURL(_lastBlobUrl); _lastBlobUrl = null; }
  setStatus(`Decoding ${(buf.byteLength / 1048576).toFixed(2)} MB…`);

  // Compute bbox from positions only (used by axis-snap buttons + R-key
  // reframe). Skip the full decode + stats — we no longer surface those.
  const n = Math.floor(buf.byteLength / REC);
  if (n > 0) {
    const dv = new DataView(buf);
    let minX = Infinity, minY = Infinity, minZ = Infinity;
    let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
    for (let i = 0; i < n; i++) {
      const o = i * REC;
      const x = dv.getFloat32(o + 0, true);
      const y = dv.getFloat32(o + 4, true);
      const z = dv.getFloat32(o + 8, true);
      if (x < minX) minX = x; if (y < minY) minY = y; if (z < minZ) minZ = z;
      if (x > maxX) maxX = x; if (y > maxY) maxY = y; if (z > maxZ) maxZ = z;
    }
    bbox = new THREE.Box3(
      new THREE.Vector3(minX, minY, minZ),
      new THREE.Vector3(maxX, maxY, maxZ),
    );
  }

  setStatus(`Loading ${n.toLocaleString()} splats into renderer…`);
  const opacityFactor = parseFloat(document.getElementById("opacity-mul").value || "1");
  const sizeFactor = parseFloat(document.getElementById("size-mul").value || "1");
  if (Math.abs(opacityFactor - 1) < 1e-3 && Math.abs(sizeFactor - 1) < 1e-3) {
    await attachSplatScene(url);
  } else {
    await rebuildScene();
  }
  setStatus(`Loaded ${n.toLocaleString()} splats.`);
  frameBoundingBox();

  // The "Loaded successfully" phrase is the ready signal comfy-test
  // (utils/comfy-test/src/comfy_test/reporting/screenshot.py) uses to
  // know when an iframe-hosted 3D viewer is done rendering — without
  // it the screenshot waits the full 60 s timeout and then captures
  // a blank canvas.
  console.log(
    `%c[HYWM2 Splat Viewer]%c Loaded successfully: ${fileMeta.filename || ".splat"} · ` +
    `${(buf.byteLength / 1048576).toFixed(2)} MB · ${n.toLocaleString()} gaussians`,
    "color:#6cc;font-weight:bold", "color:inherit",
  );
}

// ===========================================================
// State persistence: snapshot → host (auto-saved into node.properties)
// and restore ← host (after a workflow load).
// ===========================================================
let _pendingCamRestore = null;

function snapshotState() {
  const cam = viewer?.camera;
  const ctrl = viewer?.controls;
  return {
    cam: cam ? {
      position: cam.position.toArray(),
      quaternion: cam.quaternion.toArray(),
    } : null,
    target: ctrl?.target ? ctrl.target.toArray() : null,
    opacity: parseFloat(document.getElementById("opacity-mul").value),
    size: parseFloat(document.getElementById("size-mul").value),
    fov: parseFloat(document.getElementById("fov").value),
    bg: document.getElementById("background").value,
    up: document.getElementById("up-axis").value,
  };
}

let _lastStateSent = "";
setInterval(() => {
  if (!viewer) return;
  try {
    const s = snapshotState();
    const json = JSON.stringify(s);
    if (json === _lastStateSent) return;
    _lastStateSent = json;
    window.parent?.postMessage({ type: "HYWM2_VIEWER_STATE", state: s }, "*");
  } catch {}
}, 500);

function _maybeRestoreCam() {
  if (!_pendingCamRestore || !viewer?.camera) return;
  try {
    const cam = viewer.camera;
    const ctrl = viewer.controls;
    const r = _pendingCamRestore;
    if (r.position) cam.position.fromArray(r.position);
    if (r.quaternion) cam.quaternion.fromArray(r.quaternion);
    if (r.target && ctrl?.target) ctrl.target.fromArray(r.target);
    cam.updateMatrixWorld?.();
  } catch (e) {
    console.warn("[HYWM2 Splat Viewer] cam restore failed:", e);
  }
  _pendingCamRestore = null;
}

async function applyRestoredState(s) {
  if (!s) return;
  // Up-axis change rebuilds the viewer; do it FIRST so subsequent applies
  // happen against the recreated viewer.
  if (s.up && document.getElementById("up-axis").value !== s.up) {
    document.getElementById("up-axis").value = s.up;
    await recreateViewer();
    if (currentSceneUrl) await attachSplatScene(currentSceneUrl);
  }
  if (typeof s.opacity === "number") {
    document.getElementById("opacity-mul").value = String(s.opacity);
  }
  if (typeof s.size === "number") {
    document.getElementById("size-mul").value = String(s.size);
  }
  if (typeof s.fov === "number") {
    document.getElementById("fov").value = String(s.fov);
    if (viewer?.camera && "fov" in viewer.camera) {
      viewer.camera.fov = s.fov;
      viewer.camera.updateProjectionMatrix?.();
    }
  }
  if (s.bg) {
    document.getElementById("background").value = s.bg;
    applyBackgroundColor();
  }
  // If a scene is already loaded, apply opacity/size scaling now.
  if (currentSceneUrl && _origBytes) {
    await rebuildScene();
  }
  // Camera pose: defer if no scene loaded yet (will apply post-attach
  // via _maybeRestoreCam). Otherwise apply immediately.
  _pendingCamRestore = (s.cam ? { ...s.cam, target: s.target } : null);
  if (currentSceneUrl) _maybeRestoreCam();
}

// ===========================================================
// Bridge from extension.js
// ===========================================================
window.addEventListener("message", async (event) => {
  if (!event?.data) return;
  const d = event.data;

  if (d.type === "HYWM2_RESTORE_STATE") {
    try { await applyRestoredState(d.state); }
    catch (e) { console.error("[HYWM2 Splat Viewer] restore failed:", e); }
    return;
  }

  if (d.type === "HYWM2_LOAD_SPLAT") {
    const { url, filename, size, error } = d;
    if (error) { setStatus(error, true); return; }
    if (!url) return;
    try {
      await loadSplat(url, { filename, size });
      // Apply any pending camera pose now that the scene is loaded
      // (overrides the bbox-frame default).
      _maybeRestoreCam();
    } catch (err) {
      console.error(err);
      setStatus("Load error: " + (err?.message || err), true);
    }
  }
});
</script>
</body>
</html>
